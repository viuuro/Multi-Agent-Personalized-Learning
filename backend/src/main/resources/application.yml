# ===========================================================
# 个性化学习多智能体系统 —— 后端配置文件
# 【Spring Boot】application.yml 是 Spring Boot 的外部化配置核心
# Spring Boot 启动时自动读取此文件，并将属性绑定到 @Value 字段
# ===========================================================

# 【Spring Boot】内嵌 Tomcat 服务器端口配置
server:
  port: 8080

# 【Spring Boot】数据源 + JPA 自动配置（spring-boot-starter-data-jpa）
# 当前使用 H2 内存数据库（开发/测试环境），无需安装 MySQL。
# 如需切换回 MySQL，取消 pom.xml 中 MySQL 依赖的注释，并取消下方 MySQL 配置的注释。
spring:
  datasource:                                       # 【Spring Boot】DataSource 自动配置
    url: jdbc:h2:mem:edu_agent;DB_CLOSE_DELAY=-1;MODE=MYSQL  # H2 内存数据库（兼容 MySQL 模式）
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:                                               # 【Spring Boot】H2 Console 配置
    console:
      enabled: true                                 # 启用 H2 Web Console（访问 http://localhost:8080/h2-console）
      path: /h2-console                             # H2 Console 路径
  jpa:                                              # 【Spring Boot】JPA/Hibernate 自动配置
    hibernate:
      ddl-auto: update   # 【Spring Boot】ddl-auto=update: Hibernate 自动建表/更新表结构
    show-sql: false      # 【Spring Boot】开发时可设为 true 在日志中查看 SQL
    # 使用 H2 时无需指定 dialect，Hibernate 会自动检测
    # 如需切换回 MySQL，请取消下方的注释并注释掉上面的 H2 配置：
    #spring:
    #  datasource:
    #    url: jdbc:mysql://localhost:3306/edu_agent?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    #    username: ${MYSQL_USER:root}
    #    password: ${MYSQL_PASSWORD:123456}
    #    driver-class-name: com.mysql.cj.jdbc.Driver
    #  jpa:
    #    properties:
    #      hibernate:
    #        dialect: org.hibernate.dialect.MySQL8Dialect

# -----------------------------------------------------------
# Python AI 服务地址
# -----------------------------------------------------------
python:
  ai:
    url: ${PYTHON_AI_URL:http://localhost:8000}

# -----------------------------------------------------------
# AI 大模型配置（OpenAI 兼容接口）
# 用于任务成果的自动评分与分析
# -----------------------------------------------------------
ai:
  api-key: ${AI_API_KEY:}                         # API 密钥（不配置则使用 Mock 降级模式）
  base-url: ${AI_BASE_URL:https://api.openai.com/v1}  # API 基础地址
  model: ${AI_MODEL:gpt-4o}                      # 模型名称
  timeout-seconds: ${AI_TIMEOUT:60}               # 请求超时秒数
