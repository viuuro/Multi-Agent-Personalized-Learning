# ===========================================================
# 个性化学习多智能体系统 —— 后端配置文件
# 【Spring Boot】application.yml 是 Spring Boot 的外部化配置核心
# Spring Boot 启动时自动读取此文件，并将属性绑定到 @Value 字段
# ===========================================================

# 【Spring Boot】内嵌 Tomcat 服务器端口配置
server:
  port: 8080

# 【Spring Boot】数据源 + JPA 自动配置（spring-boot-starter-data-jpa）
# 默认使用 H2 文件数据库，数据写入 backend/data，重启不会丢失。
# 生产环境可通过 DB_URL/DB_USER/DB_PASSWORD/DB_DRIVER 切换到 MySQL。
spring:
  datasource:                                       # 【Spring Boot】DataSource 自动配置
    url: ${DB_URL:jdbc:h2:file:./data/edu_agent;MODE=MYSQL;AUTO_SERVER=TRUE}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  h2:                                               # 【Spring Boot】H2 Console 配置
    console:
      enabled: true                                 # 启用 H2 Web Console（访问 http://localhost:8080/h2-console）
      path: /h2-console                             # H2 Console 路径
  jpa:                                              # 【Spring Boot】JPA/Hibernate 自动配置
    hibernate:
      ddl-auto: update   # 【Spring Boot】ddl-auto=update: Hibernate 自动建表/更新表结构
    show-sql: false      # 【Spring Boot】开发时可设为 true 在日志中查看 SQL
    # MySQL 示例：
    # DB_URL=jdbc:mysql://localhost:3306/edu_agent?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    # DB_USER=root  DB_PASSWORD=123456  DB_DRIVER=com.mysql.cj.jdbc.Driver

# -----------------------------------------------------------
# Python AI 服务地址
# -----------------------------------------------------------
python:
  ai:
    url: ${PYTHON_AI_URL:http://localhost:8000}

# -----------------------------------------------------------
# Spring 本地 Mock 开关。所有真实模型调用统一由 Python AI 服务访问 MiMo-v2.5。
# -----------------------------------------------------------
ai:
  mock-enabled: ${AI_MOCK_ENABLED:false}

# 音色克隆接口保护：单用户每分钟请求数与同时生成数。
voice:
  rate-limit-per-minute: ${VOICE_RATE_LIMIT_PER_MINUTE:20}
  max-concurrent-per-user: ${VOICE_MAX_CONCURRENT_PER_USER:2}
