# ===========================================================
# 个性化学习多智能体系统 —— 后端配置文件
# 【Spring Boot】application.yml 是 Spring Boot 的外部化配置核心
# Spring Boot 启动时自动读取此文件，并将属性绑定到 @Value 字段
# ===========================================================

# 【Spring Boot】内嵌 Tomcat 服务器端口配置
server:
  port: 8080
  servlet:
    session:
      cookie:
        http-only: true
        same-site: strict
        secure: ${SESSION_COOKIE_SECURE:false}
      timeout: 8h

# 【Spring Boot】数据源 + JPA 自动配置（spring-boot-starter-data-jpa）
# 默认使用项目的 MySQL 数据库；可通过 DB_URL/DB_USER/DB_PASSWORD/DB_DRIVER 覆盖连接参数。
spring:
  datasource:                                       # 【Spring Boot】DataSource 自动配置
    url: ${DB_URL:jdbc:mysql://localhost:3306/edu_agent?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    # 兼容早期 MYSQL_* 变量；优先使用更通用的 DB_* 变量。
    username: ${DB_USER:${MYSQL_USER:root}}
    # 不提供默认密码，避免部署时意外使用弱口令；本地请在 .env/环境变量中显式配置。
    password: ${DB_PASSWORD:${MYSQL_PASSWORD:}}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
  h2:                                               # 【Spring Boot】H2 Console 配置
    console:
      enabled: false                                # 默认关闭；仅 dev profile 可显式启用
      path: /h2-console                             # H2 Console 路径
  jpa:                                              # 【Spring Boot】JPA/Hibernate 自动配置
    hibernate:
      ddl-auto: update   # 【Spring Boot】ddl-auto=update: Hibernate 自动建表/更新表结构
    show-sql: false      # 【Spring Boot】开发时可设为 true 在日志中查看 SQL
    # H2 本地替代示例：DB_URL=jdbc:h2:file:./data/edu_agent;MODE=MYSQL;AUTO_SERVER=TRUE
    # DB_USER=sa  DB_PASSWORD=  DB_DRIVER=org.h2.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB

# -----------------------------------------------------------
# Python AI 服务地址
# -----------------------------------------------------------
python:
  ai:
    url: ${PYTHON_AI_URL:http://localhost:8000}

voice:
  rate-limit-per-minute: ${VOICE_RATE_LIMIT_PER_MINUTE:10}
  max-concurrent-per-user: ${VOICE_MAX_CONCURRENT_PER_USER:2}

# -----------------------------------------------------------
# Spring 本地 Mock 开关。所有真实模型调用统一由 Python AI 服务访问 MiMo-v2.5。
# -----------------------------------------------------------
ai:
  mock-enabled: ${AI_MOCK_ENABLED:false}

knowledge:
  seed:
    software-engineering-enabled: ${KNOWLEDGE_SEED_SOFTWARE_ENGINEERING_ENABLED:true}
    core-courses-enabled: ${KNOWLEDGE_SEED_CORE_COURSES_ENABLED:true}
    course-directory: ${KNOWLEDGE_COURSE_DIRECTORY:../knowledge base}
  search:
    mysql-fulltext-enabled: ${KNOWLEDGE_MYSQL_FULLTEXT_ENABLED:true}

app:
  cors:
    allowed-origins: ${APP_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
